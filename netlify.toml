[build]
  publish = "."
  command = "npm install"

[build.environment]
  MONGO_URI = "mongodb+srv://fatma:focus123@cluster0.46fyeky.mongodb.net/focusflow?retryWrites=true&w=majority"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/*"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
