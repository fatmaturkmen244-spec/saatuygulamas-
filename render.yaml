services:
  - type: web
    name: focusflow
    env: node
    buildCommand: apt-get update && apt-get install -y chromium && npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/chromium"
